<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--surface:#18181c;--surface2:#22222a;--surface3:#2c2c38;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --accent:#7c6af7;--accent2:#a892ff;--glow:rgba(124,106,247,0.18);
  --text:#f0eeff;--text2:#9b98b4;--text3:#5c5a72;
  --danger:#f07575;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo{width:30px;height:30px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
header h1{font-size:15px;font-weight:500;letter-spacing:-0.3px}
.badge{margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--accent2);background:var(--glow);border:1px solid rgba(124,106,247,0.3);padding:3px 9px;border-radius:20px}
.toggles{display:flex;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.tbtn{display:flex;align-items:center;gap:6px;font-size:12px;font-family:var(--font);padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .2s}
.tbtn svg{width:13px;height:13px;flex-shrink:0}
.tbtn.on{background:var(--glow);border-color:rgba(124,106,247,0.4);color:var(--accent2)}
#chat{flex:1;overflow-y:auto;padding:22px 14px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:99px}
.msg{display:flex;gap:10px;max-width:740px;width:100%}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.ai{align-self:flex-start}
.av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.msg.ai .av{background:var(--accent);color:#fff}
.msg.user .av{background:var(--surface3);color:var(--text2)}
.bubble{padding:11px 15px;line-height:1.65;max-width:calc(100% - 42px);font-size:14px}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 16px 16px 16px}
.msg.user .bubble{background:var(--accent);color:#fff;border-radius:16px 4px 16px 16px}
.bubble p{margin-bottom:7px}.bubble p:last-child{margin-bottom:0}
.bubble code{font-family:var(--mono);font-size:12.5px;background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px}
.bubble pre{background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:9px;padding:12px;overflow-x:auto;margin:8px 0;font-family:var(--mono);font-size:12.5px;line-height:1.5}
.bubble pre code{background:none;padding:0}
.bubble ul,.bubble ol{padding-left:18px;margin:6px 0}
.bubble li{margin-bottom:3px}
.searching{font-size:11.5px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;gap:5px;padding-bottom:8px}
.searching svg{width:12px;height:12px;color:var(--accent2)}
.dot-wave{display:flex;gap:4px;padding:6px 2px}
.dot-wave span{width:7px;height:7px;border-radius:50%;background:var(--accent2);opacity:.6;animation:bop 1.2s infinite}
.dot-wave span:nth-child(2){animation-delay:.2s}
.dot-wave span:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,80%,100%{transform:translateY(0);opacity:.6}40%{transform:translateY(-6px);opacity:1}}
.empty{margin:auto;text-align:center;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:10px}
.empty .eico{width:52px;height:52px;background:var(--surface2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px}
.empty h2{font-size:17px;font-weight:500;color:var(--text2)}
.empty p{font-size:13px;max-width:300px;line-height:1.6}
.pills{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:4px}
.pill{font-size:12px;border:1px solid var(--border2);border-radius:20px;padding:5px 12px;color:var(--text2);cursor:pointer;transition:all .2s;background:var(--surface2)}
.pill:hover{border-color:rgba(124,106,247,0.4);color:var(--accent2)}
.iarea{border-top:1px solid var(--border);background:var(--surface);padding:10px 14px 14px;flex-shrink:0}
#fchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.fchip{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:4px 9px;font-size:11.5px;color:var(--text2)}
.fchip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 0 0 3px;line-height:1;transition:color .15s}
.fchip button:hover{color:var(--danger)}
.irow{display:flex;gap:7px;align-items:flex-end}
#ubtn{width:38px;height:38px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .2s}
#ubtn:hover{background:var(--surface3);color:var(--text)}
#ubtn svg{width:17px;height:17px}
#minput{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:13px;padding:9px 14px;color:var(--text);font-family:var(--font);font-size:14px;resize:none;min-height:40px;max-height:130px;outline:none;line-height:1.5;transition:border-color .2s}
#minput:focus{border-color:rgba(124,106,247,0.5)}
#minput::placeholder{color:var(--text3)}
#sbtn{width:38px;height:38px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;transition:all .2s}
#sbtn:hover{filter:brightness(1.15);transform:scale(1.04)}
#sbtn:disabled{opacity:.35;pointer-events:none}
#sbtn svg{width:17px;height:17px}
#finput{display:none}
.errbub{color:var(--danger);font-size:13px;padding:8px 12px;background:rgba(240,117,117,0.08);border-radius:9px;border:1px solid rgba(240,117,117,0.2)}
</style>
</head>
<body>

<header>
  <div class="logo">✦</div>
  <h1>AI Assistant</h1>
  <span class="badge">claude-sonnet-4</span>
</header>

<div class="toggles">
  <button class="tbtn on" id="t-search" onclick="tog('search')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Web search
  </button>
  <button class="tbtn" id="t-mem" onclick="tog('mem')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    Memory
  </button>
</div>

<div id="chat">
  <div class="empty" id="es">
    <div class="eico">✦</div>
    <h2>What can I help with?</h2>
    <p>Ask me anything. I can search the web and read files you attach.</p>
    <div class="pills">
      <div class="pill" onclick="qs(`What's in the tech news today?`)">Tech news today</div>
      <div class="pill" onclick="qs('Summarise the latest AI trends')">AI trends</div>
      <div class="pill" onclick="qs('Help me write a professional email')">Draft an email</div>
      <div class="pill" onclick="qs('Explain quantum computing simply')">Quantum computing</div>
    </div>
  </div>
</div>

<div class="iarea">
  <div id="fchips"></div>
  <div class="irow">
    <button id="ubtn" title="Attach file" onclick="document.getElementById('finput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <textarea id="minput" placeholder="Message…" rows="1"></textarea>
    <button id="sbtn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <input type="file" id="finput" accept="image/*,.pdf,.txt,.csv,.json,.md" multiple onchange="addFiles(event)">
</div>

<script>
const chat = document.getElementById('chat');
let files = [], history = [], feats = {search:true, mem:false}, busy = false;

function tog(k){
  feats[k]=!feats[k];
  document.getElementById('t-'+k).classList.toggle('on', feats[k]);
}

const ta = document.getElementById('minput');
ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,130)+'px'});
ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

function qs(t){ta.value=t;send()}

async function addFiles(ev){
  for(const f of ev.target.files){
    const b64=await new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(',')[1]);rd.onerror=j;rd.readAsDataURL(f)});
    files.push({f,b64});
  }
  ev.target.value='';
  renderChips();
}

function renderChips(){
  const el=document.getElementById('fchips');
  el.innerHTML=files.map((x,i)=>`<div class="fchip"><span>📎</span><span>${x.f.name}</span><button onclick="rmFile(${i})">×</button></div>`).join('');
}
function rmFile(i){files.splice(i,1);renderChips()}

function mkBubble(role, html){
  const es=document.getElementById('es');
  if(es) es.remove();
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'ai');
  d.innerHTML=`<div class="av">${role==='user'?'↑':'✦'}</div><div class="bubble">${html}</div>`;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
  return d;
}

function mkThinking(){
  const d=document.createElement('div');
  d.className='msg ai';d.id='thinking';
  d.innerHTML=`<div class="av">✦</div><div class="bubble"><div class="dot-wave"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function rmThinking(){const t=document.getElementById('thinking');if(t)t.remove()}

function md(t){
  let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<strong>$1</strong>')
    .replace(/^## (.+)$/gm,'<strong>$1</strong>')
    .replace(/^# (.+)$/gm,'<strong>$1</strong>')
    .replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n/g,'<br>');
  return h;
}

async function send(){
  if(busy) return;
  const txt=ta.value.trim();
  if(!txt&&!files.length) return;
  busy=true;
  document.getElementById('sbtn').disabled=true;

  // Show user message
  const fnames=files.map(x=>x.f.name);
  let userHtml=fnames.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${fnames.map(n=>`<span style="font-size:11.5px;background:rgba(255,255,255,0.15);padding:3px 8px;border-radius:6px">📎 ${n}</span>`).join('')}</div>`:'';
  userHtml+=md(txt||'(files attached)');
  mkBubble('user', userHtml);

  // Build content array
  const content=[];
  for(const af of files){
    const mt=af.f.type;
    if(mt.startsWith('image/')){
      content.push({type:'image',source:{type:'base64',media_type:mt,data:af.b64}});
    } else if(mt==='application/pdf'){
      content.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:af.b64}});
    } else {
      try{const decoded=decodeURIComponent(escape(atob(af.b64)));content.push({type:'text',text:`[File: ${af.f.name}]\n${decoded}`});}
      catch{content.push({type:'text',text:`[File: ${af.f.name} - binary content]`});}
    }
  }
  if(txt) content.push({type:'text',text:txt});

  const userMsg={role:'user',content};
  const msgs=feats.mem?[...history,userMsg]:[userMsg];

  files=[];renderChips();
  ta.value='';ta.style.height='auto';

  mkThinking();

  try{
    const body={
      model:'claude-sonnet-4-20250514',
      max_tokens:1500,
      system:'You are a helpful, concise assistant. Format code in fenced code blocks. Use markdown for structure when helpful.',
      messages:msgs
    };
    if(feats.search) body.tools=[{type:'web_search_20250305',name:'web_search'}];

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    rmThinking();

    if(data.error) throw new Error(data.error.message);

    const didSearch=data.content&&data.content.some(b=>b.type==='tool_use');
    const replyText=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');

    let html='';
    if(didSearch) html+=`<div class="searching"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Searched the web</div>`;
    html+=md(replyText);
    mkBubble('ai', html);

    if(feats.mem){
      history.push(userMsg);
      history.push({role:'assistant',content:replyText});
      if(history.length>20) history=history.slice(-20);
    }
  } catch(err){
    rmThinking();
    mkBubble('ai',`<div class="errbub">⚠ ${err.message}</div>`);
  }

  busy=false;
  document.getElementById('sbtn').disabled=false;
  ta.focus();
}
</script>
</body>
</html>
